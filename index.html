<style>
:root{
  --bg:#0a0a08;--s1:#111110;--s2:#181816;--s3:#1f1f1c;
  --brd:rgba(255,255,255,.06);--brd2:rgba(255,255,255,.13);
  --tx:#e2ddd4;--mu:#6e6b62;--fa:#2e2e2a;
  --org:#e87c3a;--org2:#f09a5e;
  --violet:#8b5cf6;--violet2:#a78bfa;--violet-a:rgba(139,92,246,.15);
  --cine:#7bafc4;--cine-a:rgba(123,175,196,.12);
  --arte:#b87ab8;--arte-a:rgba(184,122,184,.12);
  --arq:#c49a6a;--arq-a:rgba(196,154,106,.12);
  --mus:#72b87a;--mus-a:rgba(114,184,122,.12);
  --sci:#8a8ac4;--sci-a:rgba(138,138,196,.12);
  --nat:#9ab86a;--nat-a:rgba(154,184,106,.12);
  --cult:#c4b46a;--cult-a:rgba(196,180,106,.12);
  --pol:#c46a6a;--pol-a:rgba(196,106,106,.12);
  --serif:"Libre Baskerville",Georgia,serif;
  --sans:"IBM Plex Sans",system-ui,sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:15px;line-height:1.6;overflow-x:hidden}
/* ── MASTHEAD PELÍCULA ── */
.masthead{background:#2a1f10;position:sticky;top:0;z-index:200;padding-top:env(safe-area-inset-top)}
.film-strip{height:10px;background:#1a1208;display:flex;align-items:center;padding:0 .5rem;gap:14px;overflow:hidden}
.film-hole{width:6px;height:6px;border-radius:50%;background:#3a2a18;flex-shrink:0}
.masthead-inner{display:flex;align-items:center;gap:1rem;padding:.5rem 1rem;min-height:56px}
.logo{font-family:var(--serif);font-size:clamp(1.2rem,3vw,1.8rem);font-weight:700;font-style:italic;color:var(--org);letter-spacing:-.02em;flex:1;line-height:1}
.logo span{font-size:.6rem;color:#8a7a60;font-style:normal;font-family:var(--sans);font-weight:300;letter-spacing:.18em;text-transform:uppercase;display:block;margin-top:.25rem}
.masthead-ndh{font-family:var(--sans);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:#8a7a60;text-align:right;line-height:1.6;flex-shrink:0}
.masthead-ndh a{color:var(--org);text-decoration:none}
.masthead-ndh a:hover{color:var(--org2)}
.hdr{background:#120a05;border-bottom:1px solid var(--brd);padding:0 1rem}
.hdr-row1{display:flex;align-items:center;gap:.75rem;height:44px}
.shuf{background:none;border:1px solid var(--brd);color:var(--mu);font-size:1rem;width:34px;height:34px;border-radius:3px;cursor:pointer;flex-shrink:0;transition:color .15s,border-color .15s}
.shuf:hover{border-color:var(--org);color:var(--org)}
.search-wrap{position:relative;flex-shrink:0}
.sinp{background:var(--s2);border:1px solid var(--brd);color:var(--tx);font-family:var(--sans);font-size:.85rem;padding:.38rem .75rem .38rem 2rem;border-radius:3px;outline:none;width:140px;transition:border-color .15s,width .2s}
.sinp:focus{border-color:var(--org);width:180px}
.sico{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--mu);font-size:.8rem;pointer-events:none}
.tab-bar{display:flex;border-top:1px solid var(--brd)}
.tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--mu);font-family:var(--sans);font-size:.72rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;height:40px;cursor:pointer;transition:all .15s}
.tab.on{color:var(--org);border-bottom-color:var(--org)}
.tab.pol-tab.on{color:var(--pol);border-bottom-color:var(--pol)}
.tab.ndh-tab.on{color:var(--violet2);border-bottom-color:var(--violet)}
.filtros-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:.75rem 1rem;border-bottom:1px solid var(--brd);background:var(--s1)}
.filtros-wrap::-webkit-scrollbar{display:none}
.filtros{display:flex;gap:.35rem;white-space:nowrap}
.fb{background:none;border:1px solid var(--brd);color:var(--mu);font-family:var(--sans);font-size:.68rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase;padding:.28rem .7rem;border-radius:2rem;cursor:pointer;transition:all .15s}
.fb:hover{color:var(--violet2);border-color:var(--violet-a)}
.fb.on{color:#fff;background:var(--violet);border-color:var(--violet)}
.fb[data-c=cine].on{background:var(--cine);border-color:var(--cine);color:#0a0a08}
.fb[data-c=arte].on{background:var(--arte);border-color:var(--arte)}
.fb[data-c="arqueologia"].on,.fb[data-c="arqueología"].on{background:var(--arq);border-color:var(--arq)}
.fb[data-c=musica].on,.fb[data-c=música].on{background:var(--mus);border-color:var(--mus);color:#0a0a08}
.fb[data-c=ciencia].on{background:var(--sci);border-color:var(--sci)}
.fb[data-c=naturaleza].on{background:var(--nat);border-color:var(--nat);color:#0a0a08}
.fb[data-c=cultura].on{background:var(--cult);border-color:var(--cult);color:#0a0a08}
.fb[data-c=documental].on{background:#c48a7a;border-color:#c48a7a}
.fb[data-c=archivos].on{background:#7e9ec9;border-color:#7e9ec9}
.lang-wrap{overflow-x:auto;scrollbar-width:none;padding:.5rem 1rem;display:flex;gap:.3rem;border-bottom:1px solid var(--brd)}
.lang-wrap::-webkit-scrollbar{display:none}
.lb{background:none;border:1px solid var(--brd);color:var(--mu);font-family:var(--sans);font-size:.65rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase;padding:.22rem .6rem;border-radius:2rem;cursor:pointer;transition:all .15s}
.lb:hover{color:var(--violet2);border-color:var(--violet-a)}
.lb.on{background:var(--violet);color:#fff;border-color:var(--violet)}
.stats{display:flex;gap:1.5rem;overflow-x:auto;scrollbar-width:none;padding:.75rem 1rem;border-bottom:1px solid var(--brd);font-size:.7rem;color:var(--mu)}
.stats::-webkit-scrollbar{display:none}
.st strong{display:block;font-family:var(--serif);font-size:1.1rem;font-weight:700;color:var(--tx);line-height:1}
.wrap{padding:0 0 calc(2rem + var(--safe-b))}
.news-grid{display:grid;grid-template-columns:1fr;gap:1px;background:var(--brd)}
@media(min-width:600px){.news-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:960px){.news-grid{grid-template-columns:repeat(3,1fr)}.sinp{width:160px}}
@media(min-width:1280px){.news-grid{grid-template-columns:repeat(4,1fr)}}
.card{background:var(--s1);display:flex;animation:fi .22s ease both}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.card:hover{background:var(--s2)}
.card.ndh{border-left:2px solid var(--violet)}
.card.ndh:hover{background:rgba(139,92,246,.05)}
.card-img-wrap{flex-shrink:0;width:110px}
.card-img{width:100%;height:100%;object-fit:cover;display:block;min-height:90px;background:var(--s2)}
.card-ph{width:110px;min-height:90px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;opacity:.7}
.card-body{padding:.65rem .75rem .75rem;flex:1;min-width:0;display:flex;flex-direction:column;gap:.3rem}
.card-meta{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap}
.pill{font-size:.58rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase;padding:.14rem .45rem;border-radius:2rem}
.p-cine{background:var(--cine-a);color:var(--cine)}
.p-arte{background:var(--arte-a);color:var(--arte)}
.p-arq{background:var(--arq-a);color:var(--arq)}
.p-mus{background:var(--mus-a);color:var(--mus)}
.p-sci{background:var(--sci-a);color:var(--sci)}
.p-nat{background:var(--nat-a);color:var(--nat)}
.p-cult{background:var(--cult-a);color:var(--cult)}
.p-doc{background:rgba(196,138,122,.12);color:#c48a7a}
.p-arc{background:rgba(126,158,201,.12);color:#7e9ec9}
.p-dp{background:rgba(158,201,126,.12);color:#9ec97e}
.p-pol{background:var(--pol-a);color:var(--pol)}
.p-ndh{background:var(--violet-a);color:var(--violet2)}
.src{font-size:.63rem;color:var(--mu);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}
.mx22{width:6px;height:6px;border-radius:50%;background:var(--org);flex-shrink:0}
.ndh-dot{width:6px;height:6px;border-radius:50%;background:var(--violet);flex-shrink:0}
.lbadge{font-size:.54rem;color:var(--fa);border:1px solid var(--fa);border-radius:2px;padding:0 .25rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.card-title{font-family:var(--serif);font-size:.85rem;font-weight:700;line-height:1.3;color:var(--tx);text-decoration:none;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-title:hover{color:var(--org2)}
.card.ndh .card-title:hover{color:var(--violet2)}
.card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:.3rem}
.card-date{font-size:.6rem;color:var(--mu);opacity:.6}
.card-link{font-size:.65rem;color:var(--org);text-decoration:none;font-weight:500}
.card.ndh .card-link{color:var(--violet2)}
.empty{padding:3rem 1rem;text-align:center;color:var(--mu);font-family:var(--serif);font-style:italic;background:var(--s1)}
@media(min-width:600px){
  .card{flex-direction:column}
  .card-img-wrap,.card-ph{width:100%}
  .card-img{min-height:0;aspect-ratio:16/9;height:auto}
  .card-ph{aspect-ratio:16/9;min-height:0;height:auto;font-size:2.5rem}
  .card-body{padding:.8rem .9rem .9rem}
  .card-title{-webkit-line-clamp:4}
}
.pol-notice{background:rgba(196,106,106,.06);border-bottom:1px solid rgba(196,106,106,.18);padding:.55rem 1rem;font-size:.65rem;color:var(--pol);letter-spacing:.06em;text-transform:uppercase}
.ndh-bar{background:rgba(139,92,246,.06);border-bottom:1px solid var(--violet-a);padding:.6rem 1rem;display:flex;align-items:center;gap:1rem}
.ndh-bar-title{font-family:var(--serif);font-size:.85rem;font-style:italic;color:var(--violet2);flex:1}
.ndh-bar-sub{font-size:.65rem;color:var(--mu)}
.ndh-reload{background:none;border:1px solid var(--violet-a);color:var(--violet2);font-family:var(--sans);font-size:.62rem;letter-spacing:.06em;padding:.28rem .7rem;border-radius:2rem;cursor:pointer;transition:all .15s}
.ndh-reload:hover{background:var(--violet-a)}
#pane-cartelera,#pane-p,#pane-a{display:none}
.cine-header{padding:.75rem 1rem .5rem;border-bottom:1px solid var(--brd);font-size:.7rem;color:var(--mu);background:var(--s1)}
.cine-header strong{color:var(--tx);font-weight:500}
.cine-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--brd)}
@media(min-width:480px){.cine-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:640px){.cine-grid{grid-template-columns:repeat(5,1fr)}}
@media(min-width:900px){.cine-grid{grid-template-columns:repeat(7,1fr)}}
@media(min-width:1200px){.cine-grid{grid-template-columns:repeat(9,1fr)}}
.cc{background:var(--s1);text-decoration:none;display:block;transition:background .15s}
.cc:hover{background:var(--s2)}
.cc-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--s2)}
.cc-ph{width:100%;aspect-ratio:2/3;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:1.4rem;opacity:.3}
.cc-info{padding:.45rem .5rem .6rem}
.cc-title{font-family:var(--serif);font-size:.72rem;font-weight:700;line-height:1.25;color:var(--tx);margin-bottom:.3rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.cc-sedes{display:flex;gap:.15rem;flex-wrap:wrap}
.sede{font-size:.54rem;font-weight:500;letter-spacing:.03em;text-transform:uppercase;padding:.12rem .35rem;border-radius:2rem;background:var(--cine-a);color:var(--cine)}
.cc-ver{font-size:.58rem;color:var(--mu);margin-top:.2rem}
footer{border-top:1px solid var(--brd);padding:1.5rem 1rem;text-align:center;font-size:.68rem;color:var(--mu);letter-spacing:.04em}
footer a{color:var(--org);text-decoration:none}
footer a:hover{color:var(--org2)}
</style>
</head>

arents invest more in female offspring", "url": "https://phys.org/news/2026-06-girl-power-red-shouldered-hawk.html", "resumen": "A new study published in the Journal of Raptor Research, titled \"Factors Influencing Nestling Sex Ratios of Suburban and Rural Red-Shouldered Hawks, 2004–2016,\" finds that hawk parents prioritize producing female offspring when conditions are optimal. This means that higher quality territories could result in more females, offering biologists clues", "imagen": "https://scx1.b-cdn.net/csz/news/tmb/2026/girl-power-hawk-parent-1.jpg", "fuente": "Phys.org", "idioma": "en", "categoria": "ciencia", "fecha_pub": "2026-06-03T00:20:01+00:00"}, {"id": "689aaf7e2c66", "titulo": "“A City Tattooed with Neons”: In São Paulo, Lygia Pape Meets Queer Confessions", "url": "https://www.artforum.com/columns/a-city-tattooed-with-neons-around-sao-paulo-1234751627/", "resumen": "Across São Paulo’s galleries, artists turn to screens, Xeroxes, and neons, breathing life into Brazil’s modernist and queer histories.", "imagen": "https://www.artforum.com/wp-content/uploads/2026/06/Hudinilson-Jr.-cortesia-MartinsMontero2.jpg?w=650", "fuente": "Artforum", "idioma": "en", "categoria": "arte", "fecha_pub": "2026-06-04T18:24:44+00:00"}, {"id": "2b586c685614", "titulo": "Higher-Ed Groups Decry Proposed Federal ‘Earnings Test’ That Could Decimate Arts Education", "url": "https://www.artnews.com/art-news/news/higher-ed-decry-proposed-federal-earnings-test-arts-education-1234788169/", "resumen": "A new \"accountability\" system would judge higher-education programs largely by graduates' earnings, posing unique risks for the humanities.", "imagen": "", "fuente": "ARTnews", "idioma": "en", "categoria": "arte", "fecha_pub": "2026-06-02T21:05:32+00:00"}, {"id": "93ee0a5ede3b", "titulo": "Magic by Return of Post: How Mail Order Delivered the Occult", "url": "https://publicdomainreview.org/essay/magic-by-return-of-post", "resumen": "What allowed occultism to blossom in the United lection/de-acupunctura", "resumen": "A Dutch physician’s encounter with acupuncture.", "imagen": "https://pdr-assets.b-cdn.net/essays/de-acupunctura/BIUSante_71050_0217-edit-thumb.jpg", "fuente": "Public Domain Review", "idioma": "en", "categoria": "dominio público", "fecha_pub": "2026-05-13T14:35:00+00:00"}, {"id": "49d1da32e633", "titulo": "Seven-Word Reviews | Cannes Film Festival 2026", "url": "https://mubi.com/en/notebook/posts/seven-word-reviews-cannes-film-festival-2026", "resumen": "Seven-Word Reviews solicits contributors to assess or describe a film using a total of seven words, jotting them down on anything at hand. The series is inspired by cinema's status as the seventh art, and the internet's increasing emphasis on critical brevity. For this edition, critics and programmers at the 79th Cannes Film Festival to share their", "imagen": "https://assets.mubicdn.net/images/notebook/post_images/43230/images-w1400.jpg?1778973387", "fuente": "MUBI Notebook", "idioma": "en", "categoria": "cine", "fecha_pub": "2026-05-24T08:51:27+00:00"}, {"id": "7516b3f3574b", "titulo": "The Test of Time: “The Fast and the Furious” and Artavazd Pelechian at Cannes", "url": "https://mubi.com/en/notebook/posts/the-test-of-time-the-fast-and-the-furious-and-artavazd-pelechian-at-cannes", "resumen": "1. The Fast and the Furious (Rob Cohen, 2001). Image courtesy of Universal Studios. There is a theorem that governs the Cannes Film Festival, one that, no matter how much we try to deny, always remains: the program, for good or for bad, will always find a way to surprise us. Not gently, not apologetically, but with the blunt, almost comic force of", "imagen": "https://assets.mubicdn.net/images/notebook/post_images/43230/images-w1400.jpg?1778973387", "fuente": "MUBI Notebook", "idioma": "en", "categoria": "cine", "fecha_pub": "2026-05-25T12:21:28+00:00"}, {"id": "be5c068ab664", "titulo": "Tony Leung Chiu-wai in One Shot", "url": "https://mubi.com/en/notebook/posts/tony-leung-chiu-wai-in-o sts simulated a nuclear fireball and found a surprise in the fallout", "url": "https://www.sciencedaily.com/releases/2026/06/260603023104.htm", "resumen": "Scientists at Lawrence Livermore National Laboratory recreated part of the intense chaos inside a nuclear fireball to better understand how radioactive fallout forms. Their experiments revealed that the way vaporized materials cool can dramatically change the particles that eventually form, especially for volatile elements like cesium.", "imagen": "https://www.sciencedaily.com/images/1920/llnl-plasma-flow-reactor.webp", "fuente": "Science Daily", "idioma": "en", "categoria": "ciencia", "fecha_pub": "2026-06-03T14:25:48+00:00"}, {"id": "c9a6fec22a83", "titulo": "Greenland shark genome reveals clues to 400-year lifespan", "url": "https://phys.org/news/2026-06-greenland-shark-genome-reveals-clues.html", "resumen": "The first comprehensive map of nearly the entire Greenland shark genome is beginning to reveal some of the genetic clues behind its incredibly long life. The work could one day help scientists develop new cures and treatments for cancer and other age-related diseases.", "imagen": "https://scx1.b-cdn.net/csz/news/tmb/2026/mapping-the-genome-of.jpg", "fuente": "Phys.org", "idioma": "en", "categoria": "ciencia", "fecha_pub": "2026-06-03T18:40:06+00:00"}, {"id": "e6279fb03905", "titulo": "Antimicrobial peptide naturally found in cows breaks Klebsiella biofilms and kills drug-resistant bacteria", "url": "https://phys.org/news/2026-06-antimicrobial-peptide-naturally-cows-klebsiella.html", "resumen": "UCF College of Medicine Assistant Professor Renee Fleeman continues to refine a powerful therapy for drug-resistant bacteria that pierces the gooey coating that anchors and protects such germs from the drugs we take to kill them. Her research has found that an antimicrobial peptide naturally found in cows weakens the biofilm defenses of Klebsiella", "imagen": "https://scx1.b-cdn.net/csz/news/tmb/2026/ucf-scientist-        + '<div class="card-meta">' + dot + ndh_pill + '<span class="pill ' + pc + '">' + a.categoria + '</span>'
       + '<span class="src">' + a.fuente + '</span>' + lb + '</div>'
       + '<a class="card-title" href="' + a.url + '" target="_blank" rel="noopener">' + a.titulo + '</a>'
       + '<div class="card-foot"><span class="card-date">' + fecha + '</span>'
       + '<a class="card-link" href="' + a.url + '" target="_blank" rel="noopener">Leer \u2192</a></div>'
       + '</div></div>';
}


/* ── PANES ── */
function showPane(p){
  pane = p;
  var ids = ['n','a','cartelera','p'];
  for(var i=0;i<ids.length;i++){
    var el = document.getElementById('pane-' + ids[i]);
    var show = (ids[i]===p || (p==='c' && ids[i]==='cartelera'));
    if(el) el.style.display = show ? 'block' : 'none';
  }
  var tabs = document.querySelectorAll('.tab');
  for(var i=0;i<tabs.length;i++) tabs[i].classList.remove('on');
  var tid = p==='c' ? 'tab-c' : 'tab-'+p;
  var tel = document.getElementById(tid);
  if(tel) tel.classList.add('on');
  if(p==='c') renderCart();
  if(p==='p') renderPol();
  if(p==='a') renderNdh();
}

/* ── NOTICIAS ── */
function cts(){
  var c={};
  for(var i=0;i<ART.length;i++) c[ART[i].categoria]=(c[ART[i].categoria]||0)+1;
  return c;
}
function initFiltros(){
  var c = cts();
  var h = '<button class="fb on" data-c="todo">Todo</button>';
  for(var i=0;i<CATS.length;i++){
    var x=CATS[i];
    if(c[x]) h += '<button class="fb" data-c="'+x+'">'+x+' <small>('+c[x]+')</small></button>';
  }
  document.getElementById('filtros').innerHTML = h;
  var fbs = document.querySelectorAll('.fb');
  for(var i=0;i<fbs.length;i++){
    (function(b){ b.addEventListener('click', function(){ setC(b.getAttribute('data-c')); }); })(fbs[i]);
  }
  document.getElementById('langrow').innerHTML =
    '<button class="lb on" data-l="all">Todos</button>'+
    '<button class="lb" data-l="es">Español</button>'+
    '<button class="lb" data-l="en">English</button>';
  var lbs = document.querySelectorAll('.lb');
  for(var i=0;i<lbs.length;i++){
    (function(b){ b.addEventListener('click', function(){ setL(b.getAttribute('data-l')); }); })(lbs[i]);
  }
}
function setC(c2){
  cat=c2;
  var fbs=document.querySelectorAll('.fb');
  for(var i=0;i<fbs.length;i++) fbs[i].classList.toggle('on', fbs[i].getAttribute('data-c')===c2);
  render();
}
function setL(l){
  lang=l;
  var lbs=document.querySelectorAll('.lb');
  for(var i=0;i<lbs.length;i++) lbs[i].classList.toggle('on', lbs[i].getAttribute('data-l')===l);
  render();
}
function fil(){
  return ART.filter(function(a){
    if(cat!=='todo' && a.categoria!==cat) return false;
    if(lang!=='all' && a.idioma!==lang) return false;
    if(q){ var t=(a.titulo+' '+(a.resumen||'')+' '+a.fuente).toLowerCase(); if(t.indexOf(q)<0) return false; }
    return true;
  });
}
function render(){
  var items=fil();
  var html='';
  for(var i=0;i<items.length;i++) html+=cardH(items[i],i,false);
  var g=document.getElementById('ngrid');
  g.innerHTML = html || '<div class="empty">Sin resultados.</div>';
  var fu={}; for(var i=0;i<ART.length;i++) fu[ART[i].fuente]=1;
  var es=ART.filter(function(a){return a.idioma==='es';}).length;
  document.getElementById('sbar').innerHTML=
    '<div class="st"><strong>'+ART.length+'</strong>artículos</div>'+
    '<div class="st"><strong>'+Object.keys(fu).length+'</strong>fuentes</div>'+
    '<div class="st"><strong>'+es+'</strong>en español</div>'+
    '<div class="st"><strong>'+items.length+'</strong>mostrando</div>';
}

/* ── ARCHIVO NdH ── */
var ndbShuffled = NDB.slice();
shuffle(ndbShuffled);
function renderNdh(){
  var html='';
  for(var i=0;i<ndbShuffled.length;i++) html+=cardH(ndbShuffled[i],i,true);
  document.getElementById('agrid').innerHTML = html;
  document.getElementById('sbar-a').innerHTML=
    '<div class="st"><strong>'+ndbShuffled.length+'</strong>del archivo</div>'+
    '<div class="st"><a href="https://www.naranjasdehiroshima.com" target="_blank" style="color:var(--violet2);text-decoration:none">ver los 698 →</a></div>';
}
function reloadNdh(){ shuffle(ndbShuffled); renderNdh(); }

/* ── POLÍTICA ── */
function renderPol(){
  var items = q ? POL.filter(function(a){return (a.titulo+' '+a.fuente).toLowerCase().indexOf(q)>=0;}) : POL;
  var html='';
  for(var i=0;i<items.length;i++) html+=cardH(items[i],i,false);
  document.getElementById('pgrid').innerHTML = html;
  var fu={}; for(var i=0;i<POL.length;i++) fu[POL[i].fuente]=1;
  document.getElementById('sbar-p').innerHTML=
    '<div class="st"><strong>'+POL.length+'</strong>artículos</div>'+
    '<div class="st"><strong>'+Object.keys(fu).length+'</strong>fuentes</div>';
}

/* ── CARTELERA ── */
function renderCart(){
  var seen={};
  for(var i=0;i<CART.length;i++){
    var f=CART[i];
    var k=f.titulo.replace(/ (DOB|SUB|ESP)$/i,'').trim();
    if(!seen[k]){ seen[k]={id:f.id,titulo:k,poster:f.poster,url:f.url,sedes:f.sedes.slice(),versiones:f.versiones.slice()}; }
    else{
      for(var s=0;s<f.sedes.length;s++) if(seen[k].sedes.indexOf(f.sedes[s])<0) seen[k].sedes.push(f.sedes[s]);
      for(var v=0;v<f.versiones.length;v++) if(seen[k].versiones.indexOf(f.versiones[v])<0) seen[k].versiones.push(f.versiones[v]);
    }
  }
  var films=Object.values(seen).sort(function(a,b){return a.titulo.localeCompare(b.titulo,'es');});
  document.getElementById('cine-hdr').innerHTML='<strong>'+films.length+' películas</strong> · Cineteca Nacional (Chapultepec · Las Artes · México)';
  var html='';
  for(var i=0;i<films.length;i++){
    var f=films[i];
    var sedes=''; for(var s=0;s<f.sedes.length;s++) sedes+='<span class="sede">'+f.sedes[s].slice(0,4)+'</span>';
    var ver=f.versiones.length?'<div class="cc-ver">'+f.versiones.join('/')+'</div>':'';
    var safeTitle = f.titulo.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html+='<a class="cc" href="'+f.url+'" target="_blank" rel="noopener">'
         +'<img class="cc-poster" src="'+f.poster+'" alt="" loading="lazy">'
         +'<div class="cc-info"><div class="cc-title">'+safeTitle+'</div><div class="cc-sedes">'+sedes+'</div>'+ver+'</div></a>';
  }
  document.getElementById('cgrid').innerHTML=html;
}

/* ── INIT ── */
document.getElementById('q').addEventListener('input',function(e){
  q=e.target.value.toLowerCase();
  if(pane==='n') render();
  else if(pane==='p') renderPol();
});
document.getElementById('btn-shuffle').addEventListener('click',function(){ shuffle(ART); render(); });
document.getElementById('btn-ndh-reload').addEventListener('click', reloadNdh);
var tabs=document.querySelectorAll('[data-pane]');
for(var i=0;i<tabs.length;i++){
  (function(b){ b.addEventListener('click',function(){ showPane(b.getAttribute('data-pane')); }); })(tabs[i]);
}
initFiltros();
render();
</script>
