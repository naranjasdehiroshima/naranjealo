<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Naranjealo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a08; --s1:#111110; --s2:#181816; --s3:#1f1f1c;
  --brd:rgba(255,255,255,0.06); --brd2:rgba(255,255,255,0.12);
  --tx:#e2ddd4; --mu:#6e6b62; --fa:#2e2e2a;
  --org:#e87c3a; --org2:#f09a5e;
  --cine:#7bafc4;   --cine-a:rgba(123,175,196,.12);
  --arte:#b87ab8;   --arte-a:rgba(184,122,184,.12);
  --arq:#c49a6a;    --arq-a:rgba(196,154,106,.12);
  --mus:#72b87a;    --mus-a:rgba(114,184,122,.12);
  --sci:#8a8ac4;    --sci-a:rgba(138,138,196,.12);
  --nat:#9ab86a;    --nat-a:rgba(154,184,106,.12);
  --cult:#c4b46a;   --cult-a:rgba(196,180,106,.12);
  --serif:'Libre Baskerville',Georgia,serif;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:15px;line-height:1.6}

/* ── MASTHEAD ── */
.masthead{border-bottom:1px solid var(--brd);background:rgba(10,10,8,.97);backdrop-filter:blur(16px);position:sticky;top:0;z-index:200}
.mast-inner{max-width:1400px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;gap:1.5rem;height:56px}
.logo{font-family:var(--serif);font-size:1.4rem;font-weight:700;color:var(--org);letter-spacing:-.02em;white-space:nowrap;flex-shrink:0}
.logo sup{font-size:.55rem;color:var(--mu);font-style:italic;font-family:var(--sans);font-weight:300;vertical-align:super;letter-spacing:.02em}
.tabs{display:flex;gap:0;border-left:1px solid var(--brd)}
.tab{background:none;border:none;border-right:1px solid var(--brd);color:var(--mu);font-family:var(--sans);font-size:.72rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:0 1.1rem;height:56px;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--tx);background:var(--s1)}
.tab.on{color:var(--org);border-bottom:2px solid var(--org)}
.spacer{flex:1}
.search-wrap{position:relative;flex-shrink:0}
.search-inp{background:var(--s2);border:1px solid var(--brd);color:var(--tx);font-family:var(--sans);font-size:.8rem;padding:.3rem .75rem .3rem 1.9rem;border-radius:3px;outline:none;width:160px;transition:border-color .15s,width .2s}
.search-inp:focus{border-color:var(--org);width:200px}
.search-ico{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--mu);font-size:.8rem;pointer-events:none}

/* ── LAYOUT ── */
.wrap{max-width:1400px;margin:0 auto;padding:0 1.5rem 4rem}

/* ── SECTION HEADERS ── */
.sec-head{display:flex;align-items:baseline;gap:1rem;padding:1.8rem 0 1rem;border-bottom:1px solid var(--brd);margin-bottom:1.2rem}
.sec-head h2{font-family:var(--serif);font-size:1rem;font-weight:400;font-style:italic;color:var(--mu);letter-spacing:.01em}
.sec-count{font-size:.7rem;color:var(--fa);font-family:var(--sans)}

/* ── CARTELERA STRIP ── */
#pane-cartelera{display:none}
#pane-cartelera.visible{display:block}
.cine-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1px;background:var(--brd);border:1px solid var(--brd)}
.cine-card{background:var(--s1);transition:background .15s;text-decoration:none;display:block}
.cine-card:hover{background:var(--s2)}
.cine-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--s2)}
.cine-poster-ph{width:100%;aspect-ratio:2/3;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:1.6rem;opacity:.25}
.cine-info{padding:.6rem .7rem .8rem}
.cine-title{font-family:var(--serif);font-size:.78rem;font-weight:700;line-height:1.3;color:var(--tx);margin-bottom:.35rem}
.cine-sedes{display:flex;gap:.2rem;flex-wrap:wrap}
.sede-tag{font-size:.58rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase;padding:.15rem .4rem;border-radius:2px;background:var(--cine-a);color:var(--cine);border:1px solid rgba(123,175,196,.2)}
.cine-ver{font-size:.62rem;color:var(--mu);margin-top:.25rem}

/* ── NOTICIAS FILTROS ── */
.filtros{display:flex;gap:.2rem;flex-wrap:wrap;margin-bottom:1.2rem}
.fb{background:none;border:1px solid transparent;color:var(--mu);font-family:var(--sans);font-size:.7rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase;padding:.25rem .65rem;border-radius:2px;cursor:pointer;transition:all .15s;white-space:nowrap}
.fb:hover{color:var(--tx);border-color:var(--brd2)}
.fb.on{color:#0a0a08;background:var(--org);border-color:var(--org)}
.fb[data-c=cine].on{background:var(--cine);border-color:var(--cine)}
.fb[data-c=arte].on{background:var(--arte);border-color:var(--arte)}
.fb[data-c="arqueología"].on{background:var(--arq);border-color:var(--arq)}
.fb[data-c=música].on{background:var(--mus);border-color:var(--mus);color:#0a0a08}
.fb[data-c=ciencia].on{background:var(--sci);border-color:var(--sci)}
.fb[data-c=naturaleza].on{background:var(--nat);border-color:var(--nat);color:#0a0a08}
.fb[data-c=cultura].on{background:var(--cult);border-color:var(--cult);color:#0a0a08}
.lang-row{display:flex;gap:.2rem;margin-bottom:1rem}
.lb{background:none;border:1px solid var(--brd);color:var(--mu);font-family:var(--sans);font-size:.68rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase;padding:.22rem .6rem;border-radius:2px;cursor:pointer;transition:all .15s}
.lb.on{background:var(--s3);color:var(--tx);border-color:var(--brd2)}

/* ── NEWS GRID ── */
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:1px;background:var(--brd);border:1px solid var(--brd)}
.card{background:var(--s1);display:flex;flex-direction:column;transition:background .15s;animation:fi .25s ease both}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.card:hover{background:var(--s2)}
.card-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--s2)}
.card-ph{width:100%;aspect-ratio:16/9;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:2rem;opacity:.2}
.card-body{padding:.85rem 1rem 1rem;flex:1;display:flex;flex-direction:column;gap:.4rem}
.card-meta{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
.pill{font-size:.6rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase;padding:.16rem .5rem;border-radius:2px}
.p-cine{background:var(--cine-a);color:var(--cine);border:1px solid rgba(123,175,196,.2)}
.p-arte{background:var(--arte-a);color:var(--arte);border:1px solid rgba(184,122,184,.2)}
.p-arq{background:var(--arq-a);color:var(--arq);border:1px solid rgba(196,154,106,.2)}
.p-mus{background:var(--mus-a);color:var(--mus);border:1px solid rgba(114,184,122,.2)}
.p-sci{background:var(--sci-a);color:var(--sci);border:1px solid rgba(138,138,196,.2)}
.p-nat{background:var(--nat-a);color:var(--nat);border:1px solid rgba(154,184,106,.2)}
.p-cult{background:var(--cult-a);color:var(--cult);border:1px solid rgba(196,180,106,.2)}
.src{font-size:.66rem;color:var(--mu)}
.lbadge{font-size:.56rem;color:var(--fa);border:1px solid var(--fa);border-radius:2px;padding:0 .28rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.card-title{font-family:var(--serif);font-size:.92rem;font-weight:700;line-height:1.35;color:var(--tx);text-decoration:none}
.card-title:hover{color:var(--org2)}
.card-res{font-size:.76rem;color:var(--mu);line-height:1.55;flex:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:.4rem}
.card-date{font-size:.63rem;color:var(--mu);opacity:.6}
.card-link{font-size:.68rem;color:var(--org);text-decoration:none;font-weight:500}
.card-link:hover{color:var(--org2)}
.empty{grid-column:1/-1;padding:3.5rem 2rem;text-align:center;color:var(--mu);font-family:var(--serif);font-style:italic;background:var(--s1)}

/* ── STATS BAR ── */
.statsbar{display:flex;gap:2rem;padding:1rem 0;border-bottom:1px solid var(--brd);margin-bottom:1.5rem;font-size:.7rem;color:var(--mu)}
.st strong{display:block;font-size:1.2rem;font-family:var(--serif);color:var(--tx);line-height:1}

/* ── FOOTER ── */
footer{border-top:1px solid var(--brd);padding:2rem 1.5rem;max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:var(--mu);flex-wrap:wrap;gap:1rem}
footer code{font-family:monospace;background:var(--s2);padding:.12rem .32rem;border-radius:2px;color:var(--org);font-size:.85em}
.gh-link{color:var(--org);text-decoration:none;font-weight:500}
.gh-link:hover{color:var(--org2)}
</style>
</head>
<body>

<header class="masthead">
  <div class="mast-inner">
    <div class="logo">Naranjealo<sup>beta</sup></div>
    <div class="tabs">
      <button class="tab on" onclick="showPane('noticias')">Noticias</button>
      <button class="tab"    onclick="showPane('cartelera')">Cartelera CDMX</button>
    </div>
    <div class="spacer"></div>
    <div class="search-wrap">
      <span class="search-ico">⌕</span>
      <input class="search-inp" id="q" type="search" placeholder="Buscar…">
    </div>
  </div>
</header>

<div class="wrap">

  <!-- ── NOTICIAS ── -->
  <div id="pane-noticias">
    <div class="statsbar" id="sbar"></div>
    <div class="filtros" id="filtros"></div>
    <div class="lang-row" id="langrow"></div>
    <div class="news-grid" id="ngrid"></div>
  </div>

  <!-- ── CARTELERA ── -->
  <div id="pane-cartelera">
    <div class="sec-head">
      <h2>Cineteca Nacional — cartelera vigente</h2>
      <span class="sec-count" id="cine-count"></span>
    </div>
    <div class="cine-grid" id="cgrid"></div>
  </div>

</div>

<footer>
  <span>Naranjealo · Arte, Cine, Arqueología, Música, Ciencia · México & LATAM</span>
  <span>Actualizar: <code>python3 agregador_cultura.py --run --export-json</code></span>
  <a class="gh-link" href="https://github.com" target="_blank">GitHub →</a>
</footer>

uture spacecraft design", "url": "https://phys.org/news/2026-06-violent-rocket-particles-reshape-future.html", "resumen": "When rockets fire into space, the insides of their engines become an extreme environment where temperatures soar and tiny particles are thrown around at hypersonic speeds. These particles behave in ways that break long-held assumptions, according to new research that could help improve the durability, safety and performance of future space and defe", "imagen": "https://scx1.b-cdn.net/csz/news/tmb/2026/violent-rocket-particl.jpg", "fuente": "Phys.org", "idioma": "en", "categoria": "música", "fecha_pub": "2026-06-03T00:40:02+00:00"}, {"id": "2f76ab08e92c", "titulo": "Girl power: Red-shouldered hawk parents invest more in female offspring", "url": "https://phys.org/news/2026-06-girl-power-red-shouldered-hawk.html", "resumen": "A new study published in the Journal of Raptor Research, titled \"Factors Influencing Nestling Sex Ratios of Suburban and Rural Red-Shouldered Hawks, 2004–2016,\" finds that hawk parents prioritize producing female offspring when conditions are optimal. This means that higher quality territories could result in more females, offering biologists clues", "imagen": "https://scx1.b-cdn.net/csz/news/tmb/2026/girl-power-hawk-parent-1.jpg", "fuente": "Phys.org", "idioma": "en", "categoria": "ciencia", "fecha_pub": "2026-06-03T00:20:01+00:00"}, {"id": "96da614a5555", "titulo": "Leafy camouflage reshapes katydid love songs, making males more attractive to females", "url": "https://phys.org/news/2026-06-leafy-camouflage-reshapes-katydid-songs.html", "resumen": "New research from the University of St Andrews has discovered that insects who conceal themselves as leaves also use their leafy camouflage to amplify mating calls, making themselves more attractive to the opposite sex. The research published in Proceedings of the Royal Society B is the first demonstration of how impressive leaf mimicry can also be", "imagen": "https://scx1.b-cdn.net/csz/news/tmb/2026/leafy-lovers-male-katy.jpg", "fuente": "Phys.org", "idioma": "en", "categoria": "música", "fecha_pub": "2026-06-03T00:10:02+00:00"}, {"id": "bd68b287a472", "titulo": "Ötzi the Iceman and his microbiome—a 5,300-year-old relationship", "url": "https://phys.org/news/2026-06-tzi-iceman-microbiome-year-relationship.html", "resumen": "Researchers at Eurac Research have obtained a detailed picture of the microbial community associated with Ötzi, Europe's oldest known natural human mummy. The study provides insights into a complex microbiome, ranging from the gut flora of a Copper Age human to cold-adapted yeasts.", "imagen": "https://scx1.b-cdn.net/csz/news/tmb/2026/tzi-and-his-microbiome-1.jpg", "fuente": "Phys.org", "idioma": "en", "categoria": "ciencia", "fecha_pub": "2026-06-03T00:00:02+00:00"}, {"id": "860686bc9d1d", "titulo": "Sharks thrive in hotspots of prey, underlining need for holistic approach to conservation", "url": "https://phys.org/news/2026-06-sharks-hotspots-prey-underlining-holistic.html", "resumen": "Sharks need healthy habitats, and some have a strong preference for locations jam-packed with food, according to FIU research. A recent study of Caribbean reef sharks in the Bahamas, where shark fishing has been banned for years, shows that the sharks don't seem to like places where prey is hard to find. Instead, they prefer to live where prey is m", "imagen": "https://scx1.b-cdn.net/csz/news/tmb/2026/sharks-thrive-in-hotsp-1.jpg", "fuente": "Phys.org", "idioma": "en", "categoria": "naturaleza", "fecha_pub": "2026-06-03T00:00:01+00:00"}, {"id": "84e927e220ee", "titulo": "Biomaterial made from jackfruit latex is a promising treatment for periodontitis", "url": "https://phys.org/news/2026-06-biomaterial-jackfruit-latex-treatment-periodontitis.html", "resumen": "Researchers from the Faculty of Medical and Health Sciences (FCMS) at the Pontifical Catholic University of São Paulo (PUC-SP) in Sorocaba, in the interior of the state of São Paulo, Brazil, have developed a biomaterial containing jackfruit latex, pomegranate peel extract, and simvastatin (a statin-based medication) that shows promising efficacy in", "imagen": "https://scx1.b-cdn.net/csz/news/tmb/2026/jackfruit.jpg", "fuente": "Phys.org", "idioma": "en", "categoria": "ciencia", "fecha_pub": "2026-06-02T23:40:03+00:00"}, {"id": "6556a9eae20d", "titulo": "Strain creates moiré 2D materials without twisting or stacking, opening more scalable route", "url": "https://phys.org/news/2026-06-strain-moir-2d-materials-stacking.html", "resumen": "Cornell researchers have developed a new way to create moiré patterns—atomic-scale structures that can give materials unusual quantum behaviors—without relying on the traditionally used difficult-to-control twisting and stacking methods. The study is published in the Proceedings of the National Academy of Sciences.", "imagen": "https://scx1.b-cdn.net/csz/news/tmb/2026/researchers-make-moir.jpg", "fuente": "Phys.org", "idioma": "en", "categoria": "ciencia", "fecha_pub": "2026-06-02T23:40:02+00:00"}, {"id": "557abe2f5da4", "titulo": "Mes del Orgullo en Filmoteca UNAM", "url": "https://www.filmoteca.unam.mx/mes-del-orgullo-en-filmoteca-unam/?utm_source=rss&utm_medium=rss&utm_campaign=mes-del-orgullo-en-filmoteca-unam", "resumen": "Con estrenos de Voces de la cancha: Lo que nos jugamos en el futbol, de Juan Jaime González Varas; El fin de las primeras veces, de Rafael Ruíz Espejo; Mi pecho está lleno de centellas, de Gal S. Castellanos; O último azul, de Gabriel... The post Mes del Orgullo en Filmoteca UNAM appeared first on Filmoteca UNAM .", "imagen": "", "fuente": "Filmoteca UNAM", "idioma": "es", "categoria": "cine", "fecha_pub": "2026-06-02T23:24:04+00:00"}, {"id": "bb1428fcf04a", "titulo": "Climate-based tool predicts coral bleaching months in advance, offering critical lead time for reef protection", "url": "https://phys.org/news/2026-06-climate-based-tool-coral-months.html", "resumen": "Researchers at the Woods Hole Oceanographic Institution (WHOI) have developed a new method to predict coral bleaching five to six months before it occurs, giving reef managers valuable time to protect vulnerable ecosystems. In the new study, \"Climate modes can be leveraged to forecast coral bleaching months in advance,\" published in Communications", "imagen": "https://scx1.b-cdn.net/csz/news/tmb/2026/new-climate-based-tool.jpg", "fuente": "Phys.org", "idioma": "en", "categoria": "naturaleza", "fecha_pub": "2026-06-02T23:20:03+00:00"}, {"id": "1af52ca3a986", "titulo": "Organic farming surges in Andalusia, driven by both conviction and commercial appeal", "url": "https://phys.org/news/2026-06-farming-surges-andalusia-driven-conviction.html", "resumen": "Among the goals it has set for 2030, the European Union aims to ensure that at least one quarter of agricultural land is farmed using organic or ecological practices. In this race, Andalusia holds a significant advantage: over 50% of Spain's organic farming is concentrated in the south, making its lands a testing ground for policies that encourage", "imagen": "https://scx1.b-cdn.net/csz/news/tmb/2026/andalusia-farm.jpg", "fuente": "Phys.org", "idioma": "en", "categoria": "cultura", "fecha_pub": "2026-06-02T23:20:01+00:00"}, {"id": "862ef93c9750", "titulo": "Atomic reshuffle leads to record-breaking catalysts for hydrogen production", "url": "https://phys.org/news/2026-06-atomic-reshuffle-catalysts-hydrogen-production.html", "resumen": "Researchers have discovered that atoms can be mixed, separated, and recombined within the same experiment, providing a pathway to a record-breaking catalyst for green hydrogen production. In their study, the team created nanoscale particles containing only a few dozen platinum and nickel atoms and observed unusual dynamic behavior in direct space a", "imagen": "https://scx1.b-cdn.net/csz/news/tmb/2026/atomic-reshuffle-paves.jpg", "fuente": "Phys.org", "idioma": "en", "categoria": "ciencia", "fecha_pub": "2026-06-02T23:10:01+00:00"}, {"id": "a829a0b86ba6", "titulo": "City birds dazzle females with 'borrowed' human items", "url": "https://phys.org/news/2026-06-city-birds-dazzle-females-human.html", "resumen": "Bowerbirds in an Australian city use a range of human items—from glass and plastic to banknotes and even a pair of handcuffs—to impress females, shows new research in Royal Society Open Science. Male bowerbirds create an intricate tunnel of twigs called a bower, then gather colorful items to show to any females that visit.", "imagen": "https://scx1.b-cdn.net/csz/news/tmb/2026/city-birds-dazzle-fema.jpg", "fuente": "Phys.org", "idioma": "en", "categoria": "naturaleza", "fecha_pub": "2026-06-02T23:00:04+00:00"}, {"id": "e34fb795c2c6", "titulo": "Forest resident birds avoid intensive clearcuts, acoustic monitoring shows", "url": "https://phys.org/news/2026-06-forest-resident-birds-intensive-clearcuts.html", "resumen": "New research reveals that resident forest birds avoid intensive clearcut areas, highlighting the need for more sustainable forestry practices.", "imagen": "https://scx1.b-cdn.net/csz/news/tmb/2026/forest-resident-birds.jpg", "fuente": "Phys.org", "idioma": "en", "categoria": "naturaleza", "fecha_pub": "2026-06-02T23:00:01+00:00"}, {"id": "3d7fad0c6182", "titulo": "Laser beam builds cell-like protein networks without chemical modification", "url": "https://phys.org/news/2026-06-laser-cell-protein-networks-chemical.html", "resumen": "Networks of protein fibers play important roles in living cells. To understand the dynamical behavior of these networks, model networks are needed to perform in vitro studies. However, fabrication of protein networks similar to those in cells has proved difficult, as current methods could affect the biological function of these proteins—ultimately", "imagen": "https://scx1.b-cdn.net/csz/news/tmb/2026/laser-focus-controlled.jpg", "fuente": "Phys.org", "idioma": "en", "categoria": "ciencia", "fecha_pub": "2026-06-02T22:40: ne", "fecha_pub": "2026-06-02T21:49:38+00:00"}, {"id": "adaa88935fcf", "titulo": "French Artists Denounce Centre Pompidou and Hanwha Partnership in Open Letter", "url": "https://www.artforum.com/news/artists-denounce-centre-pompidou-and-hanwha-partnership-1234751619/", "resumen": "More than 100 prominent French artists have signed an open letter that calls for the termination of a partnership between Centre Pompidou and the South Korean business conglomerate Hanwha Group, per multiple reports. Following a four year partnership agreement initially signed in 2023, the Centre Pompidou and Hanwha planned to open the new Centre P", "imagen": "", "fuente": "Artforum", "idioma": "en", "categoria": "naturaleza", "fecha_pub": "2026-06-02T21:32:49+00:00"}, {"id": "e335f4aaeef5", "titulo": "How Do Pigeons Find Their Way Home? New Research Suggests the Birds' Remarkable Navigational Skills Come From Their Livers", "url": "https://www.smithsonianmag.com/smart-news/how-do-pigeons-find-their-way-home-new-research-suggests-the-birds-remarkable-navigational-skills-come-from-their-livers-180988884/", "resumen": "The birds might use the organs' iron-rich immune cells as internal compasses on overcast days, when they must rely on Earth’s magnetic field, instead of the sun’s light cues, for navigation", "imagen": "https://th-thumbnailer.cdn-si-edu.com/Q94qQysEoOeN2c5A7R-Nn8oCDmE=/420x240/filters:focal(700x467:701x468)/https://tf-cmsv2-smithsonianmag-media.s3.amazonaws.com/filer_public/2b/7f/2b7f55fc-668b-4907-9c1e-33bb74491e76/original-1779352008.png", "fuente": "Smithsonian Magazine", "idioma": "en", "categoria": "naturaleza", "fecha_pub": "2026-06-02T21:21:04+00:00"}, {"id": "2b586c685614", "titulo": "Higher-Ed Groups Decry Proposed Federal ‘Earnings Test’ That Could Decimate Arts Education", "url": "https://www.artnews.com/art-news/news/higher-ed-decry-proposed-federal-earnings-test-arts-education-1234788169/", "resumen": "A new \"accountability\" system would judge higher-education const CATS   = ['cine','arte','arqueología','música','ciencia','naturaleza','cultura'];
const PCLS   = {cine:'p-cine',arte:'p-arte','arqueología':'p-arq',música:'p-mus',ciencia:'p-sci',naturaleza:'p-nat',cultura:'p-cult'};
const EMO    = {cine:'🎞',arte:'🖼','arqueología':'⛏',música:'🎵',ciencia:'🔬',naturaleza:'🌿',cultura:'📖'};

let pane = 'noticias', cat = 'todo', lang = 'all', q = '';

// ── PANES ──────────────────────────────────────────────────────────────────
function showPane(p) {
  pane = p;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.textContent.toLowerCase().includes(p === 'noticias' ? 'noticia' : 'cartelera')));
  document.getElementById('pane-noticias').style.display  = p === 'noticias'  ? '' : 'none';
  document.getElementById('pane-cartelera').style.display = p === 'cartelera' ? '' : 'none';
  if (p === 'cartelera') renderCartelera();
}

// ── NOTICIAS ───────────────────────────────────────────────────────────────
function counts() {
  const c = {};
  ART.forEach(a => c[a.categoria] = (c[a.categoria]||0)+1);
  return c;
}
function buildFiltros() {
  const c = counts();
  let h = `<button class="fb on" data-c="todo" onclick="setCat('todo')">Todo <small>(${ART.length})</small></button>`;
  CATS.filter(x => c[x]).forEach(x => {
    h += `<button class="fb" data-c="${x}" onclick="setCat('${x}')">${x} <small>(${c[x]})</small></button>`;
  });
  document.getElementById('filtros').innerHTML = h;

  document.getElementById('langrow').innerHTML = `
    <button class="lb on" data-l="all" onclick="setLang('all')">Todos los idiomas</button>
    <button class="lb" data-l="es" onclick="setLang('es')">Solo español</button>
    <button class="lb" data-l="en" onclick="setLang('en')">Solo inglés</button>`;
}
function setCat(c2) {
  cat = c2;
  document.querySelectorAll('.fb').forEach(b => b.classList.toggle('on', b.dataset.c === c2));
  renderNoticias();
}
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lb').forEach(b => b.classList.toggle('on', b.dataset.l === l));
  renderNoticias();
}
function filtered() {
  return ART.filter(a => {
    if (cat !== 'todo' && a.categoria !== cat) return false;
    if (lang !== 'all' && a.idioma !== lang) return false;
    if (q) {
      const t = (a.titulo+' '+(a.resumen||'')+' '+a.fuente).toLowerCase();
      if (!t.includes(q)) return false;
    }
    return true;
  });
}
function fmt(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('es-MX',{day:'numeric',month:'short'}); }
  catch { return iso.slice(0,10); }
}
function cardHTML(a, i) {
  const img = a.imagen
    ? `<a href="${a.url}" target="_blank" rel="noopener"><img class="card-img" src="${a.imagen}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-ph>${EMO[a.categoria]||'📰'}</div>'"></a>`
    : `<div class="card-ph">${EMO[a.categoria]||'📰'}</div>`;
  const pc  = PCLS[a.categoria] || '';
  const lb  = a.idioma === 'en' ? '<span class="lbadge">EN</span>' : '';
  const isMx = a.fuente && a.fuente.includes('Canal 22') ? ' style="border-left:2px solid var(--org)"' : '';
  return `<div class="card"${isMx} style="animation-delay:${Math.min(i*.02,.4)}s">
    ${img}
    <div class="card-body">
      <div class="card-meta"><span class="pill ${pc}">${a.categoria}</span><span class="src">${a.fuente}</span>${lb}</div>
      <a class="card-title" href="${a.url}" target="_blank" rel="noopener">${a.titulo}</a>
      ${a.resumen ? `<p class="card-res">${a.resumen}</p>` : ''}
      <div class="card-foot"><span class="card-date">${fmt(a.fecha_pub)}</span><a class="card-link" href="${a.url}" target="_blank" rel="noopener">Leer →</a></div>
    </div>
  </div>`;
}
function renderNoticias() {
  const items = filtered();
  const g = document.getElementById('ngrid');
  g.innerHTML = items.length ? items.map((a,i)=>cardHTML(a,i)).join('') : '<div class="empty">Sin resultados.</div>';

  const fuentes = new Set(ART.map(a=>a.fuente)).size;
  const es = ART.filter(a=>a.idioma==='es').length;
  const en = ART.filter(a=>a.idioma==='en').length;
  document.getElementById('sbar').innerHTML = `
    <div class="st"><strong>${ART.length}</strong>artículos</div>
    <div class="st"><strong>${fuentes}</strong>fuentes</div>
    <div class="st"><strong>${es}</strong>en español</div>
    <div class="st"><strong>${en}</strong>en inglés</div>
    <div class="st"><strong>${items.length}</strong>mostrando</div>`;
}

// ── CARTELERA ─────────────────────────────────────────────────────────────
function renderCartelera() {
  // Deduplicate: a film with DOB and SUB appears twice — merge
  const seen = {};
  CART.forEach(f => {
    const key = f.titulo.replace(/ (DOB|SUB|ESP)$/i,'').trim();
    if (!seen[key]) seen[key] = {...f, titulo: key};
    else {
      f.sedes.forEach(s => { if (!seen[key].sedes.includes(s)) seen[key].sedes.push(s); });
      f.versiones.forEach(v => { if (!seen[key].versiones.includes(v)) seen[key].versiones.push(v); });
    }
  });
  const films = Object.values(seen).sort((a,b) => a.titulo.localeCompare(b.titulo, 'es'));
  document.getElementById('cine-count').textContent = `${films.length} películas`;

  document.getElementById('cgrid').innerHTML = films.map(f => {
    const poster = `<img class="cine-poster" src="${f.poster}" alt="${f.titulo}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'cine-poster-ph',textContent:'🎞'}))">`;
    const sedes  = f.sedes.map(s => `<span class="sede-tag">${s}</span>`).join('');
    const vers   = f.versiones.length ? `<div class="cine-ver">${f.versiones.join(' / ')}</div>` : '';
    return `<a class="cine-card" href="${f.url}" target="_blank" rel="noopener">
      ${poster}
      <div class="cine-info">
        <div class="cine-title">${f.titulo}</div>
        <div class="cine-sedes">${sedes}</div>
        ${vers}
      </div>
    </a>`;
  }).join('');
}

// ── INIT ──────────────────────────────────────────────────────────────────
document.getElementById('q').addEventListener('input', e => { q = e.target.value.toLowerCase(); renderNoticias(); });
buildFiltros();
renderNoticias();
</script>
